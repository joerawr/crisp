description = "Set verbosity level (1-5, or off). Lower says less. 3 is default."
argument-hint = "[1|2|3|4|5|off]"
prompt = "The crisp UserPromptSubmit hook already set the level to {{args}} and blocks this prompt on current Claude Code, so this body normally never runs. If it does run (older CLI without block support), reply with one short line confirming crisp level {{args}} and nothing else. Do not explain the levels or re-state the ruleset."
